<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOSK 통계 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto;
        }
        .login-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .dashboard {
            display: none;
        }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px;
        }
        .stat-card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #667eea;
            margin-bottom: 10px;
        }
        .stat-label { 
            color: #666; 
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chart-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .chart-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .controls h3 {
            margin-top: 0;
            color: #333;
        }
        .control-group {
            display: flex;
            gap: 15px;
            align-items: end;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        input, button {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #5a6fd8;
        }
        .top-menus {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease;
        }
        .menu-item:hover {
            background: #f8f9ff;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-rank {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .menu-info {
            flex: 1;
            margin-left: 15px;
        }
        .menu-name {
            font-weight: 600;
            color: #333;
        }
        .menu-category {
            color: #888;
            font-size: 0.9em;
        }
        .menu-stats {
            text-align: right;
            color: #667eea;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .chart-section {
                grid-template-columns: 1fr;
            }
            .control-group {
                flex-direction: column;
            }
            .form-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 AIOSK 통계 대시보드</h1>
            <p>매장 운영 현황과 비즈니스 인사이트를 한눈에 확인하세요</p>
        </div>

        <!-- 로그인 섹션 -->
        <div class="login-section" id="loginSection">
            <h3>관리자 로그인</h3>
            <form id="loginForm">
                <div style="display: flex; gap: 15px; align-items: end;">
                    <div class="form-group">
                        <label for="username">사용자명:</label>
                        <input type="text" id="username" value="admin" required>
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호:</label>
                        <input type="password" id="password" value="password" required>
                    </div>
                    <div class="form-group">
                        <button type="submit">로그인</button>
                    </div>
                </div>
            </form>
            <div id="loginResult" style="margin-top: 15px;"></div>
        </div>

        <!-- 대시보드 섹션 -->
        <div class="dashboard" id="dashboard">
            <!-- 날짜 필터 컨트롤 -->
            <div class="controls">
                <h3>📅 조회 기간 설정</h3>
                <div class="control-group">
                    <div class="form-group">
                        <label for="startDate">시작 날짜:</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label for="endDate">종료 날짜:</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="form-group">
                        <button onclick="loadDashboard()">📊 데이터 업데이트</button>
                    </div>
                    <div class="form-group">
                        <button onclick="downloadReport()">📥 CSV 다운로드</button>
                    </div>
                </div>
            </div>

            <!-- 주요 통계 카드 -->
            <div class="stats-grid" id="statsGrid">
                <div class="loading">통계 데이터를 불러오는 중...</div>
            </div>

            <!-- 차트 섹션 -->
            <div class="chart-section">
                <div class="chart-container">
                    <div class="chart-title">📈 시간대별 주문 현황</div>
                    <canvas id="hourlyChart" width="400" height="200"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">🥧 카테고리별 매출 분포</div>
                    <canvas id="categoryChart" width="400" height="200"></canvas>
                </div>
            </div>

            <!-- 인기 메뉴 순위 -->
            <div class="top-menus">
                <h3>🏆 인기 메뉴 TOP 5</h3>
                <div id="topMenusList">
                    <div class="loading">인기 메뉴 데이터를 불러오는 중...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authToken = '';
        const baseUrl = 'http://localhost:3000';
        let hourlyChart, categoryChart;

        // 로그인 처리
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${baseUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('loginResult');
                
                if (response.ok) {
                    authToken = result.data.token;
                    resultDiv.innerHTML = '<div style="color: green;">✅ 로그인 성공!</div>';
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    // 기본 날짜 설정 (최근 7일)
                    const endDate = new Date();
                    const startDate = new Date();
                    startDate.setDate(endDate.getDate() - 7);
                    
                    document.getElementById('endDate').value = endDate.toISOString().split('T')[0];
                    document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
                    
                    loadDashboard();
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ 로그인 실패: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('loginResult').innerHTML = 
                    `<div class="error">❌ 오류 발생: ${error.message}</div>`;
            }
        });

        // 대시보드 데이터 로드
        async function loadDashboard() {
            if (!authToken) return;

            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                
                let url = `${baseUrl}/api/admin/statistics`;
                const params = new URLSearchParams();
                if (startDate) params.append('startDate', startDate);
                if (endDate) params.append('endDate', endDate);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    displayStats(result.data);
                    displayCharts(result.data);
                    displayTopMenus(result.data.topSellingMenus);
                } else {
                    document.getElementById('statsGrid').innerHTML = 
                        `<div class="error">데이터 로드 실패: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = 
                    `<div class="error">오류 발생: ${error.message}</div>`;
            }
        }

        // 통계 카드 표시
        function displayStats(data) {
            const stats = data.overview;
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total_orders}</div>
                    <div class="stat-label">총 주문 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">₩${Number(stats.total_sales).toLocaleString()}</div>
                    <div class="stat-label">총 매출</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">₩${Number(stats.average_order_value).toLocaleString()}</div>
                    <div class="stat-label">평균 주문액</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.completed_orders}</div>
                    <div class="stat-label">완료된 주문</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.cancelled_orders}</div>
                    <div class="stat-label">취소된 주문</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round((stats.completed_orders / (stats.total_orders || 1)) * 100)}%</div>
                    <div class="stat-label">완료율</div>
                </div>
            `;
        }

        // 차트 표시
        function displayCharts(data) {
            // 시간대별 차트
            const hourlyData = data.hourlyAnalysis;
            const hourlyLabels = hourlyData.map(item => `${item.order_hour}시`);
            const hourlyValues = hourlyData.map(item => item.order_count);

            if (hourlyChart) hourlyChart.destroy();
            
            const hourlyCtx = document.getElementById('hourlyChart').getContext('2d');
            hourlyChart = new Chart(hourlyCtx, {
                type: 'line',
                data: {
                    labels: hourlyLabels,
                    datasets: [{
                        label: '주문 수',
                        data: hourlyValues,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            // 카테고리별 차트
            const categoryData = data.categoryStats.filter(cat => cat.category_revenue > 0);
            const categoryLabels = categoryData.map(item => item.category_name);
            const categoryValues = categoryData.map(item => Number(item.category_revenue));

            if (categoryChart) categoryChart.destroy();
            
            const categoryCtx = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(categoryCtx, {
                type: 'doughnut',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        data: categoryValues,
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#f093fb',
                            '#f5576c',
                            '#4facfe',
                            '#43e97b'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        // 인기 메뉴 표시
        function displayTopMenus(topMenus) {
            const container = document.getElementById('topMenusList');
            
            if (topMenus.length === 0) {
                container.innerHTML = '<div class="loading">데이터가 없습니다.</div>';
                return;
            }

            const menuHtml = topMenus.map((menu, index) => `
                <div class="menu-item">
                    <div class="menu-rank">${index + 1}</div>
                    <div class="menu-info">
                        <div class="menu-name">${menu.menu_name}</div>
                        <div class="menu-category">${menu.category_name || '미분류'}</div>
                    </div>
                    <div class="menu-stats">
                        <div>${menu.total_quantity}개 판매</div>
                        <div>₩${Number(menu.total_revenue).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = menuHtml;
        }

        // CSV 리포트 다운로드
        async function downloadReport() {
            if (!authToken) return;

            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                
                let url = `${baseUrl}/api/admin/statistics/report?format=csv`;
                if (startDate) url += `&startDate=${startDate}`;
                if (endDate) url += `&endDate=${endDate}`;

                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url2 = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url2;
                    a.download = `sales_report_${new Date().toISOString().split('T')[0]}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url2);
                } else {
                    alert('리포트 다운로드에 실패했습니다.');
                }
            } catch (error) {
                alert(`오류 발생: ${error.message}`);
            }
        }
    </script>
</body>
</html>
