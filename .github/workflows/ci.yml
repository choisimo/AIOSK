name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run static verification
        run: npm test

      - name: Check dependency prune status
        run: npm run deps:check

      - name: Check DB shell scripts
        run: npm run db:backup:check

      - name: Run production preflight structure check
        shell: bash
        run: |
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          mkdir -p "$temp_dir/secrets"
          cp .env.production.example "$temp_dir/env.production"
          chmod 600 "$temp_dir/env.production"
          {
            echo "AIOSK_SECRETS_DIR=$temp_dir/secrets"
            echo "METRICS_TOKEN="
            echo "METRICS_TOKEN_FILE=/run/secrets/metrics_token"
          } >> "$temp_dir/env.production"
          printf '%s' 'ci-metrics-token-at-least-32-characters' > "$temp_dir/secrets/metrics_token"
          PREFLIGHT_ENV_FILE="$temp_dir/env.production" npm run ops:preflight
        env:
          PREFLIGHT_ALLOW_PLACEHOLDERS: "1"
          PREFLIGHT_ALLOW_LOCAL_BACKUP_ONLY: "1"
          PREFLIGHT_ALLOW_NOOP_ALERTS: "1"

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_ALLOW_LOCAL_API_URL: "true"
          VITE_USE_MOCK_DATA: "false"

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  backend-e2e:
    name: Backend DB/API E2E
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aiosk_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run DB migration smoke
        run: |
          node - <<'NODE'
          const mysql = require('mysql2/promise');
          (async () => {
            const connection = await mysql.createConnection({
              host: '127.0.0.1',
              port: 3306,
              user: 'root',
              password: 'root'
            });
            await connection.query('CREATE DATABASE IF NOT EXISTS aiosk_e2e_migrate CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci');
            await connection.end();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          npm run db:migrate:status
          npm run db:migrate -- up
          npm run db:migrate:status
          npm run db:rollback
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: aiosk_e2e_migrate

      - name: Run DB/API E2E
        run: npm run test:e2e
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: aiosk_e2e
          JWT_SECRET: ci-e2e-jwt-secret-at-least-32-characters
          E2E_APP_PORT: 3100

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aiosk_e2e_browser
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e:browser
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: aiosk_e2e_browser
          JWT_SECRET: ci-browser-e2e-jwt-secret-at-least-32-characters
          E2E_APP_PORT: 3101
          E2E_FRONTEND_PORT: 5174

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - backend-e2e
      - browser-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t aiosk-backend:ci .

      - name: Build frontend image
        run: |
          docker build \
            -t aiosk-frontend:ci \
            ./frontend \
            --build-arg VITE_API_URL=http://localhost:3000 \
            --build-arg VITE_ALLOW_LOCAL_API_URL=true \
            --build-arg VITE_APP_VERSION=ci \
            --build-arg VITE_USE_MOCK_DATA=false

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/monitoring:/etc/prometheus:ro" \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml
          temp_secret_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_secret_dir"' EXIT
          printf '%s' 'ci-metrics-token-at-least-32-characters' > "$temp_secret_dir/metrics_token"
          chmod 755 "$temp_secret_dir"
          chmod 644 "$temp_secret_dir/metrics_token"
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/monitoring:/etc/prometheus:ro" \
            -v "$temp_secret_dir:/run/secrets:ro" \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.secure.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v "${{ github.workspace }}/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro" \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/alertmanager.yml

      - name: Validate Grafana dashboards
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dashboardDir = path.join(process.cwd(), 'monitoring/grafana/dashboards');
          for (const file of fs.readdirSync(dashboardDir)) {
            if (file.endsWith('.json')) {
              JSON.parse(fs.readFileSync(path.join(dashboardDir, file), 'utf8'));
              console.log(`ok dashboard ${file}`);
            }
          }
          NODE
