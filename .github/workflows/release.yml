name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Release validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release image tag
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="$INPUT_IMAGE_TAG"
          fi
          if [ -z "$release_tag" ]; then
            echo "image_tag is required for manual release image publishing." >&2
            exit 1
          fi
          if ! [[ "$release_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "image_tag contains unsupported characters." >&2
            exit 1
          fi
          if [ "$release_tag" = "latest" ] || [ "$release_tag" = "manual" ]; then
            echo "image_tag must be an immutable release tag, not latest or manual." >&2
            exit 1
          fi

      - name: Setup backend Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend static verification
        run: npm test

      - name: Check dependency prune status
        run: npm run deps:check

      - name: Check DB shell scripts
        run: npm run db:backup:check

      - name: Run production preflight structure check
        shell: bash
        run: |
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          mkdir -p "$temp_dir/secrets"
          cp .env.production.example "$temp_dir/env.production"
          chmod 600 "$temp_dir/env.production"
          {
            echo "AIOSK_SECRETS_DIR=$temp_dir/secrets"
            echo "METRICS_TOKEN="
            echo "METRICS_TOKEN_FILE=/run/secrets/metrics_token"
          } >> "$temp_dir/env.production"
          printf '%s' 'release-metrics-token-at-least-32-characters' > "$temp_dir/secrets/metrics_token"
          PREFLIGHT_ENV_FILE="$temp_dir/env.production" npm run ops:preflight
        env:
          PREFLIGHT_ALLOW_PLACEHOLDERS: "1"
          PREFLIGHT_ALLOW_LOCAL_BACKUP_ONLY: "1"
          PREFLIGHT_ALLOW_NOOP_ALERTS: "1"
          PREFLIGHT_VALIDATE_MONITORING: "1"

      - name: Audit backend dependencies
        run: npm audit --audit-level=moderate

      - name: Setup frontend Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Validate release frontend API URL
        shell: bash
        env:
          FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
          FRONTEND_KIOSK_STATUS_TOKEN: ${{ vars.FRONTEND_KIOSK_STATUS_TOKEN }}
        run: |
          if [ -z "$FRONTEND_API_URL" ]; then
            echo "FRONTEND_API_URL repository variable is required for release frontend images." >&2
            exit 1
          fi
          frontend_api_url_lower="$(printf '%s' "$FRONTEND_API_URL" | tr '[:upper:]' '[:lower:]')"
          safe_url_pattern='^https?://[^[:space:]]+$'
          if ! [[ "$frontend_api_url_lower" =~ $safe_url_pattern ]]; then
            echo "FRONTEND_API_URL must be an http or https URL with safe characters." >&2
            exit 1
          fi
          if [[ "$frontend_api_url_lower" =~ ^https?://(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])(:|/|$) ]]; then
            echo "FRONTEND_API_URL must point to the deployed backend, not a local address." >&2
            exit 1
          fi
          if [ -n "$FRONTEND_KIOSK_STATUS_TOKEN" ]; then
            if [ "${#FRONTEND_KIOSK_STATUS_TOKEN}" -lt 16 ]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must be at least 16 characters when set." >&2
              exit 1
            fi
            frontend_kiosk_status_token_lower="$(printf '%s' "$FRONTEND_KIOSK_STATUS_TOKEN" | tr '[:upper:]' '[:lower:]')"
            if [[ "$frontend_kiosk_status_token_lower" =~ ^(change_this|replace_with|your[_-]) ]]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must not use placeholder values." >&2
              exit 1
            fi
            if [[ "$FRONTEND_KIOSK_STATUS_TOKEN" =~ [[:space:]] ]]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must not contain whitespace." >&2
              exit 1
            fi
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.FRONTEND_API_URL }}
          VITE_USE_MOCK_DATA: "false"
          VITE_KIOSK_STATUS_TOKEN: ${{ vars.FRONTEND_KIOSK_STATUS_TOKEN }}

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          repository_owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.image_tag }}"
          fi
          if [ -z "$version" ]; then
            echo "image_tag is required for manual release image publishing." >&2
            exit 1
          fi
          if ! [[ "$version" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "image_tag contains unsupported characters." >&2
            exit 1
          fi
          if [ "$version" = "latest" ] || [ "$version" = "manual" ]; then
            echo "image_tag must be an immutable release tag, not latest or manual." >&2
            exit 1
          fi

          {
            echo "backend_image=ghcr.io/${repository_owner}/aiosk-backend"
            echo "frontend_image=ghcr.io/${repository_owner}/aiosk-frontend"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release frontend API URL
        shell: bash
        env:
          FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
          FRONTEND_KIOSK_STATUS_TOKEN: ${{ vars.FRONTEND_KIOSK_STATUS_TOKEN }}
        run: |
          if [ -z "$FRONTEND_API_URL" ]; then
            echo "FRONTEND_API_URL repository variable is required for release frontend images." >&2
            exit 1
          fi
          frontend_api_url_lower="$(printf '%s' "$FRONTEND_API_URL" | tr '[:upper:]' '[:lower:]')"
          safe_url_pattern='^https?://[^[:space:]]+$'
          if ! [[ "$frontend_api_url_lower" =~ $safe_url_pattern ]]; then
            echo "FRONTEND_API_URL must be an http or https URL with safe characters." >&2
            exit 1
          fi
          if [[ "$frontend_api_url_lower" =~ ^https?://(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])(:|/|$) ]]; then
            echo "FRONTEND_API_URL must point to the deployed backend, not a local address." >&2
            exit 1
          fi
          if [ -n "$FRONTEND_KIOSK_STATUS_TOKEN" ]; then
            if [ "${#FRONTEND_KIOSK_STATUS_TOKEN}" -lt 16 ]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must be at least 16 characters when set." >&2
              exit 1
            fi
            frontend_kiosk_status_token_lower="$(printf '%s' "$FRONTEND_KIOSK_STATUS_TOKEN" | tr '[:upper:]' '[:lower:]')"
            if [[ "$frontend_kiosk_status_token_lower" =~ ^(change_this|replace_with|your[_-]) ]]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must not use placeholder values." >&2
              exit 1
            fi
            if [[ "$FRONTEND_KIOSK_STATUS_TOKEN" =~ [[:space:]] ]]; then
              echo "FRONTEND_KIOSK_STATUS_TOKEN must not contain whitespace." >&2
              exit 1
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}

      - name: Build and publish frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.FRONTEND_API_URL }}
            VITE_USE_MOCK_DATA=false
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
            VITE_KIOSK_STATUS_TOKEN=${{ vars.FRONTEND_KIOSK_STATUS_TOKEN }}
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}

      - name: Deployment image summary
        run: |
          {
            echo "Published images:"
            echo "- ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}"
            echo "- ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}"
          } >> "$GITHUB_STEP_SUMMARY"
