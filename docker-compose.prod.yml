services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${COMPOSE_DB_NAME:-kiosk_db}
      MYSQL_USER: ${COMPOSE_DB_USER:-aiosk}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD:?set COMPOSE_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${COMPOSE_MYSQL_ROOT_PASSWORD:?set COMPOSE_MYSQL_ROOT_PASSWORD}
    ports:
      - "${COMPOSE_DB_BIND:-127.0.0.1}:${COMPOSE_DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${COMPOSE_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${AIOSK_BACKEND_IMAGE:?set AIOSK_BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${COMPOSE_DB_USER:-aiosk}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:?set COMPOSE_DB_PASSWORD}
      DB_NAME: ${COMPOSE_DB_NAME:-kiosk_db}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_SECRET_FILE: ${JWT_SECRET_FILE:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_SECRET_FILE: ${SESSION_SECRET_FILE:-}
      SESSION_STORE: ${SESSION_STORE:-mysql}
      SESSION_CLEANUP_INTERVAL_MS: ${SESSION_CLEANUP_INTERVAL_MS:-900000}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      SESSION_COOKIE_MAX_AGE_MS: ${SESSION_COOKIE_MAX_AGE_MS:-86400000}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      KIOSK_STATUS_TOKEN: ${KIOSK_STATUS_TOKEN:-}
      KIOSK_STATUS_TOKEN_FILE: ${KIOSK_STATUS_TOKEN_FILE:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      METRICS_TOKEN_FILE: ${METRICS_TOKEN_FILE:-}
      ALLOW_OPEN_METRICS: ${ALLOW_OPEN_METRICS:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-}
      ALLOW_OPEN_CORS: ${ALLOW_OPEN_CORS:-false}
      KIOSK_FRONTEND_URL: ${KIOSK_FRONTEND_URL:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      READINESS_DB_TIMEOUT_MS: ${READINESS_DB_TIMEOUT_MS:-2000}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1mb}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-20}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-10000}
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-logs}
    ports:
      - "${COMPOSE_BACKEND_BIND:-0.0.0.0}:${COMPOSE_BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
      - ${AIOSK_SECRETS_DIR:-/run/secrets}:/run/secrets:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/readyz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${AIOSK_FRONTEND_IMAGE:?set AIOSK_FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "${COMPOSE_FRONTEND_BIND:-0.0.0.0}:${COMPOSE_FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${COMPOSE_MONITORING_BIND:-127.0.0.1}:${COMPOSE_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.secure.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ${AIOSK_SECRETS_DIR:-/run/secrets}:/run/secrets:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${COMPOSE_MONITORING_BIND:-127.0.0.1}:${COMPOSE_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${COMPOSE_MONITORING_BIND:-127.0.0.1}:${COMPOSE_GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  backend_logs:
  backend_uploads:
  prometheus_data:
  alertmanager_data:
  grafana_data:
